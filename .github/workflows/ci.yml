name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build, Test, and Coverage
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0-x86_64-unknown-linux-gnu
          components: llvm-tools-preview, rust-src

      - name: Install dependencies
        run: |
          ./tools/install_deps.sh
          ./tools/install_verus.sh

      - name: Build
        run: cargo build --workspace --exclude kernel

      - name: Run Workspace Tests
        run: cargo test --workspace --exclude kernel

      - name: Verify Kernel with Verus
        run: ./tools/verify_kernel.sh

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run Test Coverage (70%)
        run: |
          cargo tarpaulin --workspace --exclude kernel --engine llvm --fail-under 70 --out Xml
