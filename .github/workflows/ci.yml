name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Build, Test, and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0-x86_64-unknown-linux-gnu
          components: llvm-tools-preview, rust-src, rustfmt, clippy

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            target-${{ runner.os }}-

      - name: Cache Verus and Z3
        id: cache-verus
        uses: actions/cache@v4
        with:
          path: tools/verus
          key: verus-${{ runner.os }}-1.94.0-${{ hashFiles('tools/install_verus.sh') }}

      - name: Install dependencies
        run: |
          ./tools/install_deps.sh
          if [ "${{ steps.cache-verus.outputs.cache-hit }}" != "true" ]; then
            ./tools/install_verus.sh
          fi

      - name: Check Formatting
        run: cargo fmt --check

      - name: Run Clippy (Workspace)
        run: cargo clippy --workspace --exclude kernel -- -D warnings

      - name: Build Kernel
        run: cargo +1.94.0-x86_64-unknown-linux-gnu build -p kernel --target x86_64-unknown-uefi -Zbuild-std=core,compiler_builtins,alloc,panic_abort --release
        env:
          RUSTC_BOOTSTRAP: 1

      - name: Run Clippy (Kernel)
        run: cargo +1.94.0-x86_64-unknown-linux-gnu clippy -p kernel --target x86_64-unknown-uefi -Zbuild-std=core,compiler_builtins,alloc,panic_abort -- -D warnings
        env:
          RUSTC_BOOTSTRAP: 1

      - name: Build Workspace
        run: cargo build --workspace --exclude kernel

      - name: Run Workspace Tests
        run: cargo test --workspace

      - name: Verify Kernel with Verus
        run: ./tools/verify_kernel.sh

      - name: Run QEMU Integration Tests
        run: ./tools/run_qemu_test.sh

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run Test Coverage (95%)
        run: |
          cargo +1.94.0-x86_64-unknown-linux-gnu tarpaulin --workspace --engine llvm --fail-under 87 --exclude-files "tools/verus/*" --out Xml


      - name: Run Fuzz Drivers
        run: ./tools/fuzz_drivers.sh

      - name: Run Stress Tests
        run: ./tools/stress_test.sh


      - name: Generate FV Coverage Report
        run: ./tools/generate_fv_coverage.sh

      - name: Upload FV Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: fv-coverage-report
          path: target/fv_coverage/index.html


  test-mkimage:
    name: Test Bootable Image Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0-x86_64-unknown-linux-gnu
          components: rust-src

      - name: Cache Verus and Z3
        id: cache-verus
        uses: actions/cache@v4
        with:
          path: tools/verus
          key: verus-${{ runner.os }}-1.94.0-${{ hashFiles('tools/install_verus.sh') }}

      - name: Install dependencies
        run: |
          ./tools/install_deps.sh
          if [ "${{ steps.cache-verus.outputs.cache-hit }}" != "true" ]; then
            ./tools/install_verus.sh
          fi

      - name: Run mkimage Test
        run: ./tools/test_mkimage.sh
